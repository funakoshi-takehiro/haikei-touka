<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>背景透過 | haikei-touka</title>
    <meta
      name="description"
      content="アップロードした画像の背景をブラウザ内で自動透過。画像は外部に送信されません。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="app-header">
      <h1 class="app-title">背景透過</h1>
      <div class="lang-toggle" role="group" aria-label="language">
        <button data-lang="ja" class="lang-btn is-active">JA</button>
        <button data-lang="en" class="lang-btn">EN</button>
      </div>
    </header>

    <main id="app">
      <!-- ドロップ全面オーバーレイ -->
      <div id="drop-overlay" class="drop-overlay" hidden>
        <p data-i18n="dropHere">ここにドロップ</p>
      </div>

      <!-- 初期: アップロード -->
      <section id="uploader" class="uploader">
        <button id="upload-btn" class="upload-btn">
          <svg viewBox="0 0 24 24" width="40" height="40" aria-hidden="true">
            <path
              fill="currentColor"
              d="M11 16V7.85l-2.6 2.6L7 9l5-5 5 5-1.4 1.45-2.6-2.6V16h-2Zm-7 4v-5h2v3h12v-3h2v5H4Z"
            />
          </svg>
          <span data-i18n="uploadCta">画像を選択</span>
        </button>
        <p class="uploader-hint" data-i18n="uploadHint">
          またはドラッグ＆ドロップ（複数・フォルダ可）/ JPEG・PNG・WebP
        </p>
        <p class="privacy-note" data-i18n="privacy">
          画像はあなたの端末内だけで処理され、外部に送信されません。
        </p>
      </section>

      <!-- ツールバー（処理開始後に表示） -->
      <section id="toolbar" class="toolbar" hidden>
        <div class="toolbar-left">
          <label class="field">
            <span data-i18n="format">出力形式</span>
            <select id="format-select">
              <option value="image/png">PNG</option>
              <option value="image/webp">WebP</option>
            </select>
          </label>
          <span id="status-summary" class="status-summary"></span>
        </div>
        <div class="toolbar-right">
          <button id="download-all-btn" class="btn btn-primary" data-i18n="downloadAll">
            すべてダウンロード
          </button>
          <button id="add-more-btn" class="btn" data-i18n="addMore">追加</button>
          <button id="reset-btn" class="btn btn-ghost" data-i18n="reset">クリア</button>
        </div>
      </section>

      <!-- 結果グリッド -->
      <section id="grid" class="grid" hidden></section>
    </main>

    <footer class="app-footer">
      <span data-i18n="poweredBy">ブラウザ内AI処理 · @imgly/background-removal</span>
    </footer>

    <!-- 隠しファイル入力 -->
    <input id="file-input" type="file" accept="image/png,image/jpeg,image/webp" multiple hidden />
    <input id="dir-input" type="file" accept="image/png,image/jpeg,image/webp" multiple webkitdirectory hidden />

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
